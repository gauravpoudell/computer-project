<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal NewsHub</title>

<style>
:root{
  --bg:#f4f4f4;
  --text:#111;
  --card:#fff;
}

body.dark{
  --bg:#0f1115;
  --text:#f5f5f5;
  --card:#1c1f26;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:var(--bg);color:var(--text);transition:.3s;}

header{display:flex;justify-content:space-between;align-items:center;background:#111;color:#fff;padding:15px 20px;}

nav button{margin:3px;padding:8px 12px;border:none;border-radius:6px;background:#444;color:#fff;cursor:pointer;}
nav button:hover{background:#ff4757;}

.toggle{cursor:pointer;background:#ff4757;border:none;padding:8px 12px;border-radius:6px;color:#fff;}

.ticker{background:#ff4757;color:#fff;padding:8px;overflow:hidden;}
.ticker span{display:inline-block;white-space:nowrap;animation:scroll 15s linear infinite;}
@keyframes scroll{from{transform:translateX(100%);} to{transform:translateX(-100%);} }

.container{padding:20px;}
.featured{background:var(--card);padding:20px;border-radius:12px;margin-bottom:20px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}

.card{background:var(--card);padding:15px;border-radius:12px;cursor:pointer;transition:.3s;}
.card:hover{transform:scale(1.03);} 

.hidden{display:none;}

input{padding:8px;border-radius:6px;border:1px solid #ccc;width:200px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-content{background:var(--card);padding:20px;border-radius:10px;max-width:500px;}

footer{text-align:center;padding:15px;background:#111;color:#fff;margin-top:20px;}
</style>
</head>

<body>

<header>
<h1>Nepal NewsHub</h1>
<nav>
<button onclick="filterNews('all')">All</button>
<button onclick="filterNews('sports')">Sports</button>
<button onclick="filterNews('tech')">Tech</button>
<button onclick="filterNews('world')">World</button>
</nav>

<div>
<input type="text" id="search" placeholder="Search..." onkeyup="searchNews()">
<button class="toggle" onclick="toggleDark()">Dark Mode</button>
</div>
</header>

<div class="ticker"><span id="tickerText"></span></div>

<div class="container">

<div class="featured">
<h2>Featured Article</h2>
<p id="featuredText"></p>
</div>

<h2>Latest Headlines</h2>
<div class="grid" id="newsGrid"></div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<footer>© 2026 Nepal NewsHub</footer>

<script>
const articles = [
  {category:'sports', title:'Nepal Wins Historic Cricket Series', content:'Nepal defeats a major international team in a thrilling final match.'},
  {category:'tech', title:'Nepali Student Builds AI App', content:'A student from Kathmandu develops an AI app that gains global attention.'},
  {category:'world', title:'Tourism in Nepal Hits Record High', content:'Thousands of tourists visit Nepal this year boosting the economy.'},
  {category:'sports', title:'Local Football League Expands', content:'New teams added to Nepal’s growing football scene.'},
  {category:'tech', title:'Startup Boom in Kathmandu', content:'Young entrepreneurs are launching innovative tech startups.'},
  {category:'world', title:'Everest Cleanup Campaign Success', content:'Major progress made in cleaning Mount Everest.'}
];

function renderNews(list){
  const grid = document.getElementById('newsGrid');
  grid.innerHTML='';

  list.forEach(a=>{
    const div=document.createElement('div');
    div.className='card ' + a.category;
    div.innerHTML=`<h3>${a.title}</h3><p>${a.content.substring(0,60)}...</p>`;
    div.onclick=()=>openModal(a);
    grid.appendChild(div);
  });

  document.getElementById('featuredText').innerText=list[0].title;
  document.getElementById('tickerText').innerText=list.map(a=>a.title).join(' • ');
}

function filterNews(cat){
  if(cat==='all') renderNews(articles);
  else renderNews(articles.filter(a=>a.category===cat));
}

function searchNews(){
  const val=document.getElementById('search').value.toLowerCase();
  const filtered = articles.filter(a=>a.title.toLowerCase().includes(val));
  renderNews(filtered.length?filtered:articles);
}

function toggleDark(){
  document.body.classList.toggle('dark');
}

function openModal(article){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalContent').innerHTML=`<h2>${article.title}</h2><p>${article.content}</p>`;
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

renderNews(articles);
</script>

</body>
</html>
